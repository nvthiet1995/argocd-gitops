apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: thiet-nonprod-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_GITHUB/argocd-gitops.git
    targetRevision: main
    path: clusters/thiet_nonprod/gitops/app-of-apps
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
